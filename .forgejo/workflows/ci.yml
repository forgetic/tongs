name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

# Builds are cached transparently by the kache daemon (rustc-wrapper in
# ~/.cargo/config.toml on the host runner), so a clean checkout still gets
# warm builds for everything except final binaries.
#
# skein and jig are git dependencies (pinned by rev), so Cargo fetches them
# itself — no sibling checkout, working-directory trick, or path-dependency
# layout needed. The offline subject-conformance suite reads jig's committed
# `fixtures/` via `jig_core::fixtures_root()`, which resolves inside the
# Cargo-managed git checkout.
jobs:
  validate:
    runs-on: host
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
